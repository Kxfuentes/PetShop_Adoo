<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Mascotas')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="page-shell">
    <div class="container-fluid px-3 px-lg-4">
        <div th:replace="~{fragments/layout :: alerts}"></div>

        <div class="d-flex flex-column flex-lg-row justify-content-between gap-3 align-items-lg-center mb-4">
            <div>
                <h1 class="h3 fw-bold mb-1">Mascotas</h1>
                <p class="text-secondary mb-0">Expedientes basicos asociados a clientes.</p>
            </div>
            <div class="d-flex flex-column flex-sm-row gap-2">
                <button class="btn btn-primary" type="button" data-bs-toggle="modal" data-bs-target="#newPetModal">
                    <i class="bi bi-plus-lg me-1"></i>Nueva mascota
                </button>
                <div class="input-group" style="max-width: 360px;">
                    <span class="input-group-text"><i class="bi bi-search"></i></span>
                    <input id="petSearch" type="search" class="form-control" placeholder="Buscar mascota">
                </div>
            </div>
        </div>

        <section class="content-panel p-3 p-lg-4">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0" id="petsTable">
                    <thead class="table-light">
                    <tr>
                        <th>Mascota</th>
                        <th>Cliente</th>
                        <th>Especie</th>
                        <th>Raza</th>
                        <th class="text-center">Edad</th>
                        <th class="text-end">Peso</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="mascota : ${mascotas}">
                        <td class="fw-semibold" th:text="${mascota.nombre}">Mascota</td>
                        <td th:text="${mascota.clienteNombre}">Cliente</td>
                        <td th:text="${mascota.especie ?: 'Sin especie'}">Especie</td>
                        <td th:text="${mascota.raza ?: 'Sin raza'}">Raza</td>
                        <td class="text-center" th:text="${mascota.edad ?: '-'}">0</td>
                        <td class="text-end">
                            <span th:if="${mascota.peso != null}" th:text="${#numbers.formatDecimal(mascota.peso, 1, 'COMMA', 2, 'POINT') + ' kg'}">0.00 kg</span>
                            <span th:unless="${mascota.peso != null}">-</span>
                        </td>
                        <td class="text-end">
                            <button class="btn btn-outline-danger btn-sm" type="button"
                                    th:data-delete-url="@{/api/servicios/mascotas/{id}(id=${mascota.id})}">
                                <i class="bi bi-trash3 me-1"></i>Eliminar
                            </button>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(mascotas)}">
                        <td colspan="7" class="text-center text-secondary py-4">No hay mascotas registradas.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>
</main>

<div class="modal fade" id="newPetModal" tabindex="-1" aria-labelledby="newPetModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <form id="newPetForm" class="needs-validation" novalidate>
                <div class="modal-header">
                    <h2 class="modal-title h5" id="newPetModalLabel">Registrar mascota</h2>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body">
                    <div id="newPetAlert"></div>
                    <div class="row g-3">
                        <div class="col-12 col-md-6">
                            <label for="petClientId" class="form-label">Cliente</label>
                            <select id="petClientId" class="form-select" required>
                                <option value="">Seleccionar cliente</option>
                                <option th:each="cliente : ${clientes}"
                                        th:value="${cliente.id}"
                                        th:text="${cliente.nombre + ' - ' + (cliente.telefono ?: 'Sin telefono')}">
                                    Cliente
                                </option>
                            </select>
                            <div class="invalid-feedback">Selecciona el cliente responsable.</div>
                        </div>
                        <div class="col-12 col-md-6">
                            <label for="petName" class="form-label">Nombre</label>
                            <input id="petName" class="form-control" type="text" required>
                            <div class="invalid-feedback">Ingresa el nombre de la mascota.</div>
                        </div>
                        <div class="col-12 col-md-6">
                            <label for="petSpecies" class="form-label">Especie</label>
                            <input id="petSpecies" class="form-control" type="text" placeholder="Perro, gato...">
                        </div>
                        <div class="col-12 col-md-6">
                            <label for="petBreed" class="form-label">Raza</label>
                            <input id="petBreed" class="form-control" type="text">
                        </div>
                        <div class="col-12 col-md-6">
                            <label for="petAge" class="form-label">Edad</label>
                            <input id="petAge" class="form-control" type="number" min="0">
                        </div>
                        <div class="col-12 col-md-6">
                            <label for="petWeight" class="form-label">Peso kg</label>
                            <input id="petWeight" class="form-control" type="number" min="0" step="0.01">
                        </div>
                        <div class="col-12">
                            <label for="petNotes" class="form-label">Observaciones</label>
                            <textarea id="petNotes" class="form-control" rows="3"></textarea>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check2-circle me-1"></i>Guardar mascota
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
<script>
    (() => {
        const search = document.getElementById('petSearch');
        const rows = Array.from(document.querySelectorAll('#petsTable tbody tr'));
        const newPetForm = document.getElementById('newPetForm');
        const newPetModal = bootstrap.Modal.getOrCreateInstance(document.getElementById('newPetModal'));
        const newPetAlert = document.getElementById('newPetAlert');

        function showNewPetAlert(type, message) {
            newPetAlert.innerHTML = `
                <div class="alert alert-${type} py-2" role="alert">
                    ${message}
                </div>`;
        }

        search.addEventListener('input', () => {
            const term = search.value.trim().toLowerCase();
            rows.forEach((row) => {
                row.classList.toggle('d-none', term && !row.textContent.toLowerCase().includes(term));
            });
        });

        newPetForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            newPetForm.classList.add('was-validated');
            if (!newPetForm.checkValidity()) {
                return;
            }

            try {
                const response = await fetch('/api/servicios/mascotas', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        clienteId: Number(document.getElementById('petClientId').value),
                        nombre: document.getElementById('petName').value.trim(),
                        especie: document.getElementById('petSpecies').value.trim(),
                        raza: document.getElementById('petBreed').value.trim(),
                        edad: document.getElementById('petAge').value ? Number(document.getElementById('petAge').value) : null,
                        peso: document.getElementById('petWeight').value ? Number(document.getElementById('petWeight').value) : null,
                        observaciones: document.getElementById('petNotes').value.trim()
                    })
                });

                if (!response.ok) {
                    const error = await response.json().catch(() => ({}));
                    throw new Error(error.error || error.mensaje || error.message || 'No fue posible registrar la mascota.');
                }

                showNewPetAlert('success', 'Mascota registrada correctamente.');
                setTimeout(() => window.location.reload(), 700);
                newPetModal.hide();
            } catch (error) {
                showNewPetAlert('danger', error.message);
            }
        });

        document.getElementById('petsTable').addEventListener('click', async (event) => {
            const button = event.target.closest('[data-delete-url]');
            if (!button || !window.confirm('Deseas eliminar esta mascota?')) {
                return;
            }
            try {
                const response = await fetch(button.dataset.deleteUrl, {method: 'DELETE'});
                if (!response.ok) {
                    const error = await response.json().catch(() => ({}));
                    throw new Error(error.error || 'No fue posible eliminar la mascota. Puede tener citas asociadas.');
                }
                window.location.reload();
            } catch (error) {
                showNewPetAlert('danger', error.message);
            }
        });
    })();
</script>
</body>
</html>
