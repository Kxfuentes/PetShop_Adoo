<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Clientes')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="page-shell">
    <div class="container-fluid px-3 px-lg-4">
        <div th:replace="~{fragments/layout :: alerts}"></div>

        <div class="d-flex flex-column flex-lg-row justify-content-between gap-3 align-items-lg-center mb-4">
            <div>
                <h1 class="h3 fw-bold mb-1">Clientes</h1>
                <p class="text-secondary mb-0">Directorio basico para ventas y servicios.</p>
            </div>
            <div class="d-flex flex-column flex-sm-row gap-2">
                <button class="btn btn-primary" type="button" data-bs-toggle="modal" data-bs-target="#newClientModal">
                    <i class="bi bi-person-plus me-1"></i>Nuevo cliente
                </button>
                <div class="input-group" style="max-width: 360px;">
                    <span class="input-group-text"><i class="bi bi-search"></i></span>
                    <input id="clientSearch" type="search" class="form-control" placeholder="Buscar cliente">
                </div>
            </div>
        </div>

        <section class="content-panel p-3 p-lg-4">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0" id="clientsTable">
                    <thead class="table-light">
                    <tr>
                        <th>Cliente</th>
                        <th>Telefono</th>
                        <th>Correo</th>
                        <th>Direccion</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="cliente : ${clientes}">
                        <td class="fw-semibold" th:text="${cliente.nombre}">Cliente</td>
                        <td th:text="${cliente.telefono ?: 'Sin telefono'}">Telefono</td>
                        <td th:text="${cliente.correo ?: 'Sin correo'}">Correo</td>
                        <td class="text-secondary" th:text="${cliente.direccion ?: 'Sin direccion'}">Direccion</td>
                        <td class="text-end">
                            <button class="btn btn-outline-danger btn-sm" type="button"
                                    th:data-delete-url="@{/api/servicios/clientes/{id}(id=${cliente.id})}"
                                    data-delete-label="cliente">
                                <i class="bi bi-trash3 me-1"></i>Eliminar
                            </button>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(clientes)}">
                        <td colspan="5" class="text-center text-secondary py-4">No hay clientes registrados.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>
</main>

<div class="modal fade" id="newClientModal" tabindex="-1" aria-labelledby="newClientModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <form id="newClientForm" class="needs-validation" novalidate>
                <div class="modal-header">
                    <h2 class="modal-title h5" id="newClientModalLabel">Registrar cliente</h2>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body">
                    <div id="newClientAlert"></div>
                    <div class="mb-3">
                        <label for="clientName" class="form-label">Nombre</label>
                        <input id="clientName" class="form-control" type="text" required>
                        <div class="invalid-feedback">Ingresa el nombre del cliente.</div>
                    </div>
                    <div class="mb-3">
                        <label for="clientPhone" class="form-label">Telefono</label>
                        <input id="clientPhone" class="form-control" type="tel">
                    </div>
                    <div class="mb-3">
                        <label for="clientEmail" class="form-label">Correo</label>
                        <input id="clientEmail" class="form-control" type="email">
                        <div class="invalid-feedback">Ingresa un correo valido.</div>
                    </div>
                    <div class="mb-0">
                        <label for="clientAddress" class="form-label">Direccion</label>
                        <input id="clientAddress" class="form-control" type="text">
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-outline-secondary" type="button" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-primary" type="submit">
                        <i class="bi bi-check2-circle me-1"></i>Guardar cliente
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
<script>
    (() => {
        const search = document.getElementById('clientSearch');
        const rows = Array.from(document.querySelectorAll('#clientsTable tbody tr'));
        const newClientForm = document.getElementById('newClientForm');
        const newClientAlert = document.getElementById('newClientAlert');

        function showClientAlert(type, message) {
            newClientAlert.innerHTML = `<div class="alert alert-${type} py-2" role="alert">${message}</div>`;
        }

        search.addEventListener('input', () => {
            const term = search.value.trim().toLowerCase();
            rows.forEach((row) => {
                row.classList.toggle('d-none', term && !row.textContent.toLowerCase().includes(term));
            });
        });

        newClientForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            newClientForm.classList.add('was-validated');
            if (!newClientForm.checkValidity()) {
                return;
            }

            try {
                const response = await fetch('/api/servicios/clientes', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        nombre: document.getElementById('clientName').value.trim(),
                        telefono: document.getElementById('clientPhone').value.trim(),
                        correo: document.getElementById('clientEmail').value.trim(),
                        direccion: document.getElementById('clientAddress').value.trim()
                    })
                });

                if (!response.ok) {
                    const error = await response.json().catch(() => ({}));
                    throw new Error(error.error || error.mensaje || error.message || 'No fue posible registrar el cliente.');
                }

                showClientAlert('success', 'Cliente registrado correctamente.');
                newClientForm.reset();
                newClientForm.classList.remove('was-validated');
                setTimeout(() => window.location.reload(), 700);
            } catch (error) {
                showClientAlert('danger', error.message);
            }
        });

        document.getElementById('clientsTable').addEventListener('click', async (event) => {
            const button = event.target.closest('[data-delete-url]');
            if (!button || !window.confirm('Deseas eliminar este cliente?')) {
                return;
            }
            try {
                const response = await fetch(button.dataset.deleteUrl, {method: 'DELETE'});
                if (!response.ok) {
                    const error = await response.json().catch(() => ({}));
                    throw new Error(error.error || 'No fue posible eliminar el cliente. Puede tener ventas, mascotas o citas asociadas.');
                }
                window.location.reload();
            } catch (error) {
                alert(error.message);
            }
        });
    })();
</script>
</body>
</html>
