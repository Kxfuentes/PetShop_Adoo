<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Iniciar sesion')}"></head>
<body>
<main class="min-vh-100 d-flex align-items-center py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-7 col-lg-5 col-xl-4">
                <div class="content-panel p-4 p-lg-5">
                    <div class="text-center mb-4">
                        <div class="brand-mark mx-auto mb-3">
                            <i class="bi bi-heart-pulse-fill"></i>
                        </div>
                        <h1 class="h4 fw-bold mb-1">PetShop Management</h1>
                        <p class="text-secondary mb-0">Acceso al sistema de gestion</p>
                    </div>

                    <div th:if="${param.error}" class="alert alert-danger" role="alert">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        Credenciales invalidas o usuario inactivo.
                    </div>

                    <div th:if="${param.logout}" class="alert alert-success" role="alert">
                        <i class="bi bi-check-circle-fill me-2"></i>
                        Sesion cerrada correctamente.
                    </div>

                    <form th:action="@{/login}" method="post" class="needs-validation" novalidate>
                        <div class="mb-3">
                            <label for="username" class="form-label">Correo electronico</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                <input id="username" name="username" type="email" class="form-control"
                                       autocomplete="username" placeholder="admin@petshop.com" required autofocus>
                                <div class="invalid-feedback">Ingresa un correo valido.</div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label">Contrasena</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input id="password" name="password" type="password" class="form-control"
                                       autocomplete="current-password" minlength="4" required>
                                <div class="invalid-feedback">Ingresa tu contrasena.</div>
                            </div>
                        </div>

                        <button class="btn btn-primary w-100 py-2" type="submit">
                            <i class="bi bi-box-arrow-in-right me-1"></i>Ingresar
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: scripts}"></div>
<script>
    (() => {
        'use strict';
        document.querySelectorAll('.needs-validation').forEach((form) => {
            form.addEventListener('submit', (event) => {
                if (!form.checkValidity()) {
                    event.preventDefault();
                    event.stopPropagation();
                }
                form.classList.add('was-validated');
            });
        });
    })();
</script>
</body>
</html>
